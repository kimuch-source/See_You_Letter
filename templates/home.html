<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CULetter</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <script src="{{ url_for('static', filename='js/main.js')}}" defer></script>
    </head>
    <body>
        <div id="navArea">
            <nav>
                <div class="inner">
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/link">LINE連携</a></li>
                        <li><a href="#">ログアウト</a></li>
                    </ul>
                </div>
            </nav>
                
            <div class="toggle-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div id="mask"></div>

                <main>
                    <h2>メモをリマインドするよ！！</h2>
                    <form action="/memo" method="POST" id="memoForm">
                        <input type="text" name="content" placeholder="内容を入力" required>
                        <input type="hidden" name="timer" id="timer">
                        <button id="show-btn" type="button">▶</button>

                        <div id="time-panel">
                            <p class="time-panel-label">入力された時間にLINEを送るよ</p>
                            <div class="time-panel-inputs"></div>
                            <label class="time-input-group">
                                <input type="number" name="input_hours" min="0" max="999" value="1">
                                時間
                                <input type="number" name="input_minutes" min="0" max="59" value="0">
                                分後
                            </label>
                            <button type="submit"> ✅ 確定 </button>
                            <button id="cancell-btn" type="button">キャンセル</button>
                        </div>
                        <!-- <p id="remind-previw" class="remind-previw"> -->
                    </form>
                </main>
            <table>
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>内容</th>
                        <th>編集</th>
                    </tr>
                </thead>
                <tbody>
                    {% for memo in memos %}
                        <tr>
                            <td>{{ memo.countdown }}</td>
                            <td>{{ memo.content }}</td>
                            <td>
                                <button>✏️</button>
                                <button>🗑️</button>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </body>
</html>
